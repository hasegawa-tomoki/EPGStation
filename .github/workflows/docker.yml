name: Docker

on:
    push:
        branches:
            - master
        tags:
            - '*'
    workflow_dispatch:
        inputs:
            full_matrix:
                description: 'Build all platforms/distros (alpine + debian + arm)'
                required: false
                default: 'false'

env:
    MAIN_DISTRO: debian
    REGISTRY: ghcr.io
    IMAGE_NAME: hasegawa-tomoki/epgstation

jobs:
    build:
        permissions:
            contents: read
            packages: write
        strategy:
            matrix:
                # master push は debian のみで高速化。tag push と workflow_dispatch
                # の full_matrix=true 指定時は alpine も build する (cond は後段で処理)。
                distro:
                    - debian
                    - alpine
                include:
                    - distro: alpine
                      full_platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8
                    - distro: debian
                      # docker/setup-*-action has not supported linux/arm/v5.
                      full_platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Determine build matrix
              id: matrix
              run: |
                  # tag push もしくは workflow_dispatch で full_matrix=true なら全アーキ、
                  # それ以外 (master への push) は amd64 only & debian 以外はスキップ
                  FULL=false
                  if [[ "$GITHUB_REF" == refs/tags/* ]]; then FULL=true; fi
                  if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "${{ github.event.inputs.full_matrix }}" == "true" ]]; then FULL=true; fi

                  if [ "$FULL" = "true" ]; then
                      PLATFORMS="${{ matrix.full_platforms }}"
                      SKIP="false"
                  else
                      PLATFORMS="linux/amd64"
                      # debian 以外は skip
                      if [ "${{ matrix.distro }}" != "$MAIN_DISTRO" ]; then
                          SKIP="true"
                      else
                          SKIP="false"
                      fi
                  fi
                  {
                      echo "platforms=$PLATFORMS"
                      echo "skip=$SKIP"
                      echo "full=$FULL"
                  } >> "$GITHUB_OUTPUT"
                  echo "Build matrix: distro=${{ matrix.distro }} platforms=$PLATFORMS skip=$SKIP full=$FULL"
            - name: Docker tags
              if: steps.matrix.outputs.skip != 'true'
              id: docker-tags
              run: |
                  IMAGE="${REGISTRY}/${IMAGE_NAME}"
                  SHORT_SHA="${GITHUB_SHA::7}"
                  TAGS=""
                  append() {
                      if [ -z "$TAGS" ]; then TAGS="$1"; else TAGS="$TAGS,$1"; fi
                  }

                  # immutable commit SHA tag (常に付ける)
                  append "$IMAGE:sha-$SHORT_SHA-${{ matrix.distro }}"
                  if [ "$MAIN_DISTRO" = "${{ matrix.distro }}" ]; then
                      append "$IMAGE:sha-$SHORT_SHA"
                  fi

                  case "$GITHUB_REF" in
                      refs/heads/*)
                          GIT_BRANCH="${GITHUB_REF#refs/heads/}"
                          append "$IMAGE:$GIT_BRANCH-${{ matrix.distro }}"
                          if [ "$MAIN_DISTRO" = "${{ matrix.distro }}" ]; then
                              append "$IMAGE:$GIT_BRANCH"
                          fi
                          ;;
                      refs/tags/*)
                          GIT_TAG="${GITHUB_REF#refs/tags/}"
                          append "$IMAGE:$GIT_TAG-${{ matrix.distro }}"
                          if [ "$MAIN_DISTRO" = "${{ matrix.distro }}" ]; then
                              append "$IMAGE:$GIT_TAG"
                          fi
                          ;;
                  esac

                  echo "Tags: $TAGS"
                  echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
            - name: Setup QEMU user-mode emulation
              if: steps.matrix.outputs.skip != 'true' && steps.matrix.outputs.full == 'true'
              uses: docker/setup-qemu-action@v3
            - name: Setup Docker Buildx
              if: steps.matrix.outputs.skip != 'true'
              uses: docker/setup-buildx-action@v3
            - name: Login to GitHub Container Registry
              if: steps.matrix.outputs.skip != 'true'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push
              if: steps.matrix.outputs.skip != 'true'
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: Dockerfile.${{ matrix.distro }}
                  platforms: ${{ steps.matrix.outputs.platforms }}
                  tags: ${{ steps.docker-tags.outputs.tags }}
                  cache-from: type=gha,scope=${{ matrix.distro }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.distro }}
                  push: true
