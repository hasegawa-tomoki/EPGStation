name: Docker

on:
    push:
        branches:
            - master
        tags:
            - '*'
    workflow_dispatch:

env:
    MAIN_DISTRO: debian
    REGISTRY: ghcr.io
    IMAGE_NAME: hasegawa-tomoki/epgstation

jobs:
    build:
        permissions:
            contents: read
            packages: write
        strategy:
            matrix:
                distro:
                    - alpine
                    - debian
                include:
                    - distro: alpine
                      platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8
                    - distro: debian
                      # docker/setup-*-action has not supported linux/arm/v5.
                      platforms: linux/amd64,linux/arm/v7,linux/arm64/v8
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Docker tags
              id: docker-tags
              run: |
                  IMAGE="${REGISTRY}/${IMAGE_NAME}"
                  SHORT_SHA="${GITHUB_SHA::7}"
                  TAGS=""
                  append() {
                      if [ -z "$TAGS" ]; then TAGS="$1"; else TAGS="$TAGS,$1"; fi
                  }

                  # immutable commit SHA tag (常に付ける)
                  append "$IMAGE:sha-$SHORT_SHA-${{ matrix.distro }}"
                  if [ "$MAIN_DISTRO" = "${{ matrix.distro }}" ]; then
                      append "$IMAGE:sha-$SHORT_SHA"
                  fi

                  case "$GITHUB_REF" in
                      refs/heads/*)
                          GIT_BRANCH="${GITHUB_REF#refs/heads/}"
                          append "$IMAGE:$GIT_BRANCH-${{ matrix.distro }}"
                          if [ "$MAIN_DISTRO" = "${{ matrix.distro }}" ]; then
                              append "$IMAGE:$GIT_BRANCH"
                          fi
                          ;;
                      refs/tags/*)
                          GIT_TAG="${GITHUB_REF#refs/tags/}"
                          append "$IMAGE:$GIT_TAG-${{ matrix.distro }}"
                          if [ "$MAIN_DISTRO" = "${{ matrix.distro }}" ]; then
                              append "$IMAGE:$GIT_TAG"
                          fi
                          ;;
                  esac

                  echo "Tags: $TAGS"
                  echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
            - name: Setup QEMU user-mode emulation
              uses: docker/setup-qemu-action@v3
            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: Dockerfile.${{ matrix.distro }}
                  platforms: ${{ matrix.platforms }}
                  tags: ${{ steps.docker-tags.outputs.tags }}
                  cache-from: type=gha,scope=${{ matrix.distro }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.distro }}
                  push: true
