# 本番 (/opt/epgstation/compose.yml) の services: 配下に追記する例。
# image タグは ghcr.io にビルド済みのものを ARG で書き換える運用に合わせる。
# CPU 制御は i7-14700K (P-core 0-15, E-core 16-27) を想定。lscpu -e で実環境を要確認。

  transcribe:
    image: ghcr.io/hasegawa-tomoki/epgstation-transcribe:sha-XXXXXXX
    volumes:
      - /var/data/video:/app/recorded:ro            # EPGStation と同じパスでマウント (RECPATH をそのまま使うため)
      - /var/data/epgstation/data:/app/data         # transcript 出力 (EPGStation 側からも参照可能)
      - hf-cache:/cache/huggingface                 # モデルキャッシュ (~1.5GB) を永続化
    env_file:
      - .env                                        # HF_TOKEN を含む
    environment:
      TZ: "Asia/Tokyo"
      WHISPER_MODEL: "kotoba-tech/kotoba-whisper-v2.2"
      WHISPER_LANGUAGE: "ja"
      WHISPER_CHUNK_LENGTH_S: "15"
      WHISPER_BATCH_SIZE: "8"
      WHISPER_ADD_PUNCTUATION: "1"
      TRANSCRIPT_OUTPUT_DIR: "/app/data/transcripts"
    cpus: 8.0
    cpuset: "16-27"             # E-core のみ
    cpu_shares: 256             # 競合時に EPGStation より低優先 (default 1024)
    mem_limit: 12g              # transformers + pyannote + diarizers のロード時に余裕を持たせる
    restart: always
    logging:
      options:
        max-size: "10m"
        max-file: "3"

# volumes: の末尾に追加
#   hf-cache:
#     driver: local

# EPGStation 側 config.yml の recordingFinishCommand 設定:
#   recordingFinishCommand: '/usr/local/bin/node /app/data/scripts/transcribe-hook.js'
#
# transcribe-hook.js は repo 内 transcribe/transcribe-hook.js を
# /var/data/epgstation/data/scripts/transcribe-hook.js に配置 (chmod +x)。
# EPGStation の ProcessUtil.parseCmdStr は単純な空白 split のため
# sh -c や curl の quote 構文は使えない。Node 標準モジュールでラップしている。
